                            allPhotos.push({
                                ...photo,
                                projectId: project.id,
                                projectName: project.name,
                                siteId: site.id,
                                siteName: site.name
                            });
                        });
                    });
                });
                return allPhotos.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
            };

            // Filtrer les données selon le mode de tri
            const getFilteredData = () => {
                if (sortBy === "recent") {
                    return getAllPhotos();
                } else if (sortBy === "project") {
                    if (selectedProject) {
                        const project = projectsData.find(p => p.id === selectedProject);
                        if (project) {
                            const photos = [];
                            project.sites.forEach(site => {
                                site.photos.forEach(photo => {
                                    photos.push({
                                        ...photo,
                                        projectId: project.id,
                                        projectName: project.name,
                                        siteId: site.id,
                                        siteName: site.name
                                    });
                                });
                            });
                            return photos.sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
                        }
                    }
                    return projectsData;
                } else if (sortBy === "site") {
                    if (selectedProject && selectedSite) {
                        const project = projectsData.find(p => p.id === selectedProject);
                        if (project) {
                            const site = project.sites.find(s => s.id === selectedSite);
                            if (site) {
                                return site.photos.map(photo => ({
                                    ...photo,
                                    projectId: project.id,
                                    projectName: project.name,
                                    siteId: site.id,
                                    siteName: site.name
                                })).sort((a, b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
                            }
                        }
                    } else if (selectedProject) {
                        const project = projectsData.find(p => p.id === selectedProject);
                        return project ? project.sites : [];
                    }
                    // Si aucun projet sélectionné, afficher tous les sites de tous les projets
                    const allSites = [];
                    projectsData.forEach(project => {
                        project.sites.forEach(site => {
                            allSites.push({
                                ...site,
                                projectId: project.id,
                                projectName: project.name
                            });
                        });
                    });
                    return allSites;
                }
                return [];
            };

            const filteredData = getFilteredData();

            const TimelinePost = ({ post }) => {
                // Vérifier si post a les propriétés nécessaires pour une photo
                if (!post.author || !post.image) {
                    return null;
                }

                return (
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-6 max-w-3xl mx-auto">
                        {/* Header */}
                        <div className="p-4 pb-3">
                            <div className="flex items-start justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-slate-900 text-white rounded-full flex items-center justify-center font-bold text-sm">
                                        {post.author.split(' ').map(n => n[0]).join('')}
                                    </div>
                                    <div>
                                        <p className="font-bold text-slate-900">{post.author}</p>
                                        <p className="text-xs text-slate-500">
                                            {post.authorRole} • {post.projectName || post.project || 'Projet inconnu'}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded-full">
                                        {post.category}
                                    </span>
                                    <span className="text-xs text-slate-500">{post.time}</span>
                                </div>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="px-4 pb-3">
                            <p className="text-slate-800 font-medium">{post.description}</p>
                        </div>

                        {/* Image */}
                        <div className="relative">
                            <img 
                                src={post.image} 
                                alt={post.description}
                                className="w-full object-cover cursor-pointer hover:opacity-95 transition-opacity"
                            />
                        </div>
                    </div>
                );
            };

            const ProjectCard = ({ project }) => (
                <div 
                    onClick={() => {
                        setSelectedProject(project.id);
                        setNavigationLevel("project");
                    }}
                    className="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all cursor-pointer group"
                >
                    <div className="p-6">
                        <div className="flex items-start justify-between mb-4">
                            <div>
                                <h3 className="text-lg font-bold text-slate-900 group-hover:text-orange-600 transition-colors">
                                    {project.name}
                                </h3>
                                <span className="inline-block px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full mt-1">
                                    {project.status}
                                </span>
                            </div>
                            <div className="flex items-center gap-2 text-slate-500">
                                <HardHat size={16} />
                                <span className="text-sm font-bold">{project.sites.length} sites</span>
                            </div>
                        </div>
                        
                        <div className="space-y-3">
                            <div className="flex items-center justify-between">
                                <span className="text-sm text-slate-600">Sites du projet</span>
                                <ChevronRight size={16} className="text-slate-400 group-hover:text-orange-500 transition-colors" />
                            </div>
                            <div className="space-y-2">
                                {project.sites.slice(0, 3).map(site => (
                                    <div key={site.id} className="flex items-center gap-2 text-sm text-slate-600">
                                        <MapPin size={12} className="text-slate-400" />
                                        <span>{site.name}</span>
                                        <span className="text-xs text-slate-400">({site.photos.length} photos)</span>
                                    </div>
                                ))}
                                {project.sites.length > 3 && (
                                    <div className="text-xs text-slate-400 italic">
                                        +{project.sites.length - 3} autres sites
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="mt-4 pt-4 border-t border-slate-100">
                            <div className="flex items-center justify-between">
                                <span className="text-xs text-slate-500">
                                    {project.sites.reduce((total, site) => total + site.photos.length, 0)} photos au total
                                </span>
                                <span className="text-xs text-orange-600 font-bold">
                                    Voir les détails →
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const SiteCard = ({ site, project }) => (
                <div 
                    onClick={() => {
                        setSelectedProject(project.id);
                        setSelectedSite(site.id);
                        setNavigationLevel("site");
                    }}
                    className="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all cursor-pointer group"
                >
                    <div className="p-6">
                        <div className="flex items-start justify-between mb-4">
                            <div>
                                <h3 className="text-lg font-bold text-slate-900 group-hover:text-orange-600 transition-colors">
                                    {site.name}
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{project.name}</p>
                            </div>
                            <div className="flex items-center gap-2 text-slate-500">
                                <Camera size={16} />
                                <span className="text-sm font-bold">{site.photos.length} photos</span>
                            </div>
                        </div>
                        
                        {/* Aperçu des photos */}
                        <div className="grid grid-cols-3 gap-2 mb-4">
                            {site.photos.slice(0, 3).map(photo => (
                                <div key={photo.id} className="aspect-square rounded-lg overflow-hidden bg-slate-100">
                                    <img 
                                        src={photo.image} 
                                        alt={photo.description}
                                        className="w-full h-full object-cover hover:scale-105 transition-transform"
                                    />
                                </div>
                            ))}
                            {site.photos.length > 3 && (
                                <div className="aspect-square rounded-lg overflow-hidden bg-slate-100 flex items-center justify-center">
                                    <span className="text-sm text-slate-600 font-bold">+{site.photos.length - 3}</span>
                                </div>
                            )}
                        </div>
                        
                        <div className="flex items-center justify-between">
                            <span className="text-xs text-slate-500">
                                Dernière photo : {new Date(site.photos[site.photos.length - 1]?.date).toLocaleDateString('fr-FR')}
                            </span>
                            <ChevronRight size={16} className="text-slate-400 group-hover:text-orange-500 transition-colors" />
                        </div>
                    </div>
                </div>
            );

            const PhotoGallery = ({ photos }) => (
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                    {photos.map(post => (
                        <div key={post.id} className="relative group cursor-pointer">
                            <div className="aspect-[4/3] bg-slate-100 rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300">
                                <img 
                                    src={post.image} 
                                    alt={post.description} 
                                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                    <div className="absolute bottom-3 left-3 right-3">
                                        <p className="text-white text-sm font-semibold truncate drop-shadow-md">{post.description}</p>
                                        <p className="text-white/90 text-xs truncate drop-shadow-md">{post.author}</p>
                                    </div>
                                </div>
                                <span className="absolute top-2 right-2 bg-white/90 backdrop-blur text-xs font-bold px-2 py-1 rounded-lg text-slate-800 shadow-sm">
                                    {post.category}
                                </span>
                            </div>
                        </div>
                    ))}
                </div>
            );

            const GridView = () => {
                if (sortBy === "project" && !selectedProject) {
                    // Vue des projets
                    return (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredData.map(project => (
                                <ProjectCard key={project.id} project={project} />
                            ))}
                        </div>
                    );
                } else if (sortBy === "site" && !selectedSite) {
                    // Vue des sites (avec projet sélectionné ou tous les sites)
                    return (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredData.map(site => {
                                // Trouver le projet parent pour ce site
                                const project = projectsData.find(p => p.id === site.projectId);
                                return (
                                    <SiteCard key={site.id} site={site} project={project} />
                                );
                            })}
                        </div>
                    );
                } else {
                    // Vue des photos - GALERIE MODERNE
                    return <PhotoGallery photos={filteredData} />;
                }
            };

            // Statistiques pour la vue Direction
            const getStatistics = () => {
                const allPhotos = getAllPhotos();
                const today = new Date().toISOString().split('T')[0];
                const todayPhotos = allPhotos.filter(photo => photo.date === today);
                const weekPhotos = allPhotos.filter(photo => {
                    const photoDate = new Date(photo.date);
                    const weekAgo = new Date();
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    return photoDate >= weekAgo;
                });

                return {
                    totalPhotos: allPhotos.length,
                    todayPhotos: todayPhotos.length,
                    weekPhotos: weekPhotos.length,
                    totalProjects: projectsData.length,
                    totalSites: projectsData.reduce((total, project) => total + project.sites.length, 0),
                    activeProjects: projectsData.filter(p => p.status === "En cours").length
                };
            };

            const stats = getStatistics();

            return (
                <div className="space-y-6">
                    {/* Header avec statistiques pour Direction */}
                    <div className="space-y-4">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-900">Galerie Photo - Vue Direction</h2>
                                <p className="text-slate-500">Vue consolidée de l'activité sur tous les chantiers.</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button className="px-4 py-2 bg-slate-900 text-white rounded-lg font-bold hover:bg-slate-800 shadow-md">
                                    + Ajouter Photo
                                </button>
                            </div>
                        </div>

                        {/* Cartes de statistiques */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <Camera size={16} className="text-slate-500" />
                                    <span className="text-xs text-slate-500 font-bold">Total Photos</span>
                                </div>
                                <p className="text-2xl font-bold text-slate-900">{stats.totalPhotos}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <Calendar size={16} className="text-orange-500" />
                                    <span className="text-xs text-slate-500 font-bold">Aujourd'hui</span>
                                </div>
                                <p className="text-2xl font-bold text-orange-600">{stats.todayPhotos}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <Clock size={16} className="text-blue-500" />
                                    <span className="text-xs text-slate-500 font-bold">7 derniers jours</span>
                                </div>
                                <p className="text-2xl font-bold text-blue-600">{stats.weekPhotos}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <HardHat size={16} className="text-green-500" />
                                    <span className="text-xs text-slate-500 font-bold">Projets</span>
                                </div>
                                <p className="text-2xl font-bold text-green-600">{stats.totalProjects}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <MapPin size={16} className="text-purple-500" />
                                    <span className="text-xs text-slate-500 font-bold">Sites</span>
                                </div>
                                <p className="text-2xl font-bold text-purple-600">{stats.totalSites}</p>
                            </div>
                            <div className="bg-white rounded-lg border border-slate-200 p-4">
                                <div className="flex items-center gap-2 mb-1">
                                    <CheckCircle2 size={16} className="text-emerald-500" />
                                    <span className="text-xs text-slate-500 font-bold">Actifs</span>
                                </div>
                                <p className="text-2xl font-bold text-emerald-600">{stats.activeProjects}</p>
                            </div>
                        </div>
                    </div>

                    {/* Advanced Navigation */}
                    <div className="space-y-4">
                        {/* Sort Options */}
                        <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
                            <div className="flex gap-2 p-1 bg-slate-100 rounded-lg">
                                <button 
                                    onClick={() => {
                                        setSortBy("recent");
                                        setSelectedProject(null);
                                        setSelectedSite(null);
                                        setNavigationLevel("global");
                                    }}
                                    className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${
                                        sortBy === "recent" 
                                        ? 'bg-white text-slate-900 shadow-sm' 
                                        : 'text-slate-600 hover:text-slate-900'
                                    }`}
                                >
                                    <Clock size={16} className="inline mr-1" />
                                    Récent
                                </button>
                                <button 
                                    onClick={() => {
                                        setSortBy("project");
                                        setSelectedProject(null);
                                        setSelectedSite(null);
                                        setNavigationLevel("projects");
                                    }}
                                    className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${
                                        sortBy === "project" 
                                        ? 'bg-white text-slate-900 shadow-sm' 
                                        : 'text-slate-600 hover:text-slate-900'
                                    }`}
                                >
                                    <HardHat size={16} className="inline mr-1" />
                                    Projet
                                </button>
                                <button 
                                    onClick={() => {
                                        setSortBy("site");
                                        setSelectedProject(null);
                                        setSelectedSite(null);
                                        setNavigationLevel("projects");
                                    }}
                                    className={`px-4 py-2 rounded-md text-sm font-bold transition-colors ${
                                        sortBy === "site" 
                                        ? 'bg-white text-slate-900 shadow-sm' 
                                        : 'text-slate-600 hover:text-slate-900'
                                    }`}
                                >
                                    <MapPin size={16} className="inline mr-1" />
                                    Site
                                </button>
                            </div>
                        </div>

                        {/* Navigation Breadcrumb */}
                        {(selectedProject || selectedSite) && (
                            <div className="flex items-center gap-2 text-sm text-slate-600">
                                <button 
                                    onClick={() => {
                                        setSelectedProject(null);
                                        setSelectedSite(null);
                                        setNavigationLevel("global");
                                    }}
                                    className="hover:text-slate-900 font-bold"
                                >
                                    Tous les projets
                                </button>
                                {selectedProject && (
                                    <>
                                        <ChevronRight size={16} />
                                        <button 
                                            onClick={() => {
                                                setSelectedSite(null);
                                                setNavigationLevel("project");
                                            }}
                                            className="hover:text-slate-900 font-bold"
                                        >
                                            {projectsData.find(p => p.id === selectedProject)?.name}
                                        </button>
                                    </>
                                )}
                                {selectedSite && (
                                    <>
                                        <ChevronRight size={16} />
                                        <span className="text-slate-900 font-bold">
                                            {projectsData.find(p => p.id === selectedProject)?.sites.find(s => s.id === selectedSite)?.name}
                                        </span>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                    
                    {/* Content - GALERIE PHOTO MODERNE */}
                    <GridView />
                </div>
            );
        };

        const App = () => (
            <MainLayout activePage="timeline" breadcrumb="Mes projets > Résidence Horizon > Activité" userRole="Chef de Projet">
                <GalerieChantierPage />
            </MainLayout>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
