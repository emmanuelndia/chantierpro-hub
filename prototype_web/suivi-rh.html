                    monthlyData.map(emp => `${emp.name},${emp.matricule},${emp.totalHours}h,${emp.sessions},${emp.lastProject}`).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `suivi-rh-${selectedMonth.replace(' ', '-')}.csv`;
                a.click();
            };

            const handleExportExcel = () => {
                // Simulation d'export Excel
                alert(`Export Excel des données de ${selectedMonth} en cours...`);
            };

            const handleViewDetail = (employeeId) => {
                setSelectedEmployeeDetail(getEmployeeDetail(employeeId));
                setView('detail');
            };

            if (view === 'detail' && selectedEmployeeDetail) {
                return (
                    <div className="space-y-6 animate-in slide-in-from-right-4">
                        <div className="flex justify-between items-center">
                            <button onClick={() => setView('dashboard')} className="text-slate-400 hover:text-orange-600 text-sm font-bold mb-2 flex items-center gap-1 transition-colors">
                                ← Retour au tableau de bord
                            </button>
                            <div className="flex gap-3">
                                <button onClick={handleExportCSV} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 transition-all shadow-md">
                                    <FileSpreadsheet size={18} />
                                    Exporter CSV
                                </button>
                                <button onClick={handleExportExcel} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-all shadow-md">
                                    <Download size={18} />
                                    Exporter Excel
                                </button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="w-16 h-16 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-xl">
                                    {selectedEmployeeDetail.employee.name.split(' ').map(n => n[0]).join('')}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-900">{selectedEmployeeDetail.employee.name}</h2>
                                    <p className="text-slate-500">Matricule : {selectedEmployeeDetail.employee.matricule}</p>
                                    <p className="text-sm text-slate-600 mt-1">
                                        {selectedMonth} • {selectedEmployeeDetail.employee.totalHours}h totales • {selectedEmployeeDetail.employee.sessions} sessions
                                    </p>
                                </div>
                            </div>

                            <div className="grid grid-cols-4 gap-4 mb-8">
                                <div className="bg-slate-50 p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-slate-900">{selectedEmployeeDetail.employee.totalHours}h</div>
                                    <div className="text-xs text-slate-600 font-medium">Total mensuel</div>
                                </div>
                                <div className="bg-blue-50 p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-blue-700">{selectedEmployeeDetail.employee.sessions}</div>
                                    <div className="text-xs text-blue-600 font-medium">Sessions</div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-lg text-center">
                                    <div className="text-2xl font-bold text-green-700">{selectedEmployeeDetail.employee.avgSession}h</div>
                                    <div className="text-xs text-green-600 font-medium">Moyenne/session</div>
                                </div>
                                <div className="bg-orange-50 p-4 rounded-lg text-center">
                                    <div className="text-lg font-bold text-orange-700">{selectedEmployeeDetail.employee.lastProject}</div>
                                    <div className="text-xs text-orange-600 font-medium">Dernier projet</div>
                                </div>
                            </div>

                            <h3 className="text-lg font-bold text-slate-900 mb-4">Sessions de pointage détaillées</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
                                        <tr>
                                            <th className="px-4 py-3 font-bold">Date</th>
                                            <th className="px-4 py-3 font-bold text-center">Arrivée</th>
                                            <th className="px-4 py-3 font-bold text-center">Départ</th>
                                            <th className="px-4 py-3 font-bold text-center">Durée</th>
                                            <th className="px-4 py-3 font-bold">Projet</th>
                                            <th className="px-4 py-3 font-bold">Site/Chantier</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {selectedEmployeeDetail.sessions.map((session, i) => (
                                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-4 py-3 font-medium text-slate-900">{session.date}</td>
                                                <td className="px-4 py-3 text-center text-slate-600">{session.arrival}</td>
                                                <td className="px-4 py-3 text-center text-slate-600">{session.departure}</td>
                                                <td className="px-4 py-3 text-center font-bold text-orange-600">{session.duration}</td>
                                                <td className="px-4 py-3 text-slate-700">{session.project}</td>
                                                <td className="px-4 py-3 text-slate-600">{session.site}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-900">Suivi RH</h2>
                            <p className="text-slate-500">Tableau de bord mensuel : heures de présence par employé</p>
                        </div>
                        <div className="flex gap-3">
                            <button className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 rounded-lg font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                                <Calendar size={18} />
                                {selectedMonth}
                            </button>
                            <button onClick={handleExportCSV} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 transition-all shadow-md">
                                <FileSpreadsheet size={18} />
                                Exporter CSV
                            </button>
                            <button onClick={handleExportExcel} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-all shadow-md">
                                <Download size={18} />
                                Exporter Excel
                            </button>
                        </div>
                    </div>

                    {/* Zone de filtres */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-center">
                        <div className="flex items-center gap-2">
                            <Filter size={18} className="text-slate-400" />
                            <span className="text-sm font-bold text-slate-700">Filtres :</span>
                        </div>
                        <select 
                            value={selectedMonth} 
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            className="bg-slate-50 border border-slate-300 rounded-md px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-orange-500"
                        >
                            <option>Avril 2026</option>
                            <option>Mars 2026</option>
                            <option>Février 2026</option>
                            <option>Janvier 2026</option>
                        </select>
                        <select 
                            value={selectedEmployee}
                            onChange={(e) => setSelectedEmployee(e.target.value)}
                            className="bg-slate-50 border border-slate-300 rounded-md px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-orange-500"
                        >
                            <option>Tous les employés</option>
                            <option>Techniciens</option>
                            <option>Chefs de chantier</option>
                            <option>Maçons</option>
                            <option>Électriciens</option>
                        </select>
                        <select 
                            value={selectedProject}
                            onChange={(e) => setSelectedProject(e.target.value)}
                            className="bg-slate-50 border border-slate-300 rounded-md px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-orange-500"
                        >
                            <option>Tous les projets</option>
                            <option>Résidence Horizon</option>
                            <option>Parking Central</option>
                            <option>Tour Ivoire</option>
                        </select>
                    </div>

                    {/* Tableau de bord mensuel */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto w-full pb-2">
                            <table className="w-full text-left min-w-[800px]">
                                <thead className="bg-slate-900 text-white text-xs uppercase">
                                    <tr>
                                        <th className="px-6 py-4 font-bold">Employé</th>
                                        <th className="px-6 py-4 font-bold text-center">Total Heures</th>
                                        <th className="px-6 py-4 font-bold text-center">Sessions</th>
                                        <th className="px-6 py-4 font-bold text-center">Moyenne/Session</th>
                                        <th className="px-6 py-4 font-bold">Dernier Projet</th>
                                        <th className="px-6 py-4 font-bold">Dernier Site</th>
                                        <th className="px-6 py-4 font-bold text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {monthlyData.map((employee) => (
                                        <tr key={employee.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-6 py-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-orange-600 text-white rounded-full flex items-center justify-center font-bold text-sm">
                                                        {employee.name.split(' ').map(n => n[0]).join('')}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-slate-900">{employee.name}</p>
                                                        <p className="text-xs text-slate-500 uppercase">{employee.matricule}</p>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 text-center">
                                                <span className="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-orange-100 text-orange-800">
                                                    {employee.totalHours}h
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 text-center text-slate-600 font-medium">{employee.sessions}</td>
                                            <td className="px-6 py-4 text-center text-slate-600">{employee.avgSession}h</td>
                                            <td className="px-6 py-4 text-slate-700 font-medium">{employee.lastProject}</td>
                                            <td className="px-6 py-4 text-slate-600 text-sm">{employee.lastSite}</td>
                                            <td className="px-6 py-4 text-right">
                                                <button 
                                                    onClick={() => handleViewDetail(employee.id)}
                                                    className="inline-flex items-center gap-2 text-orange-600 font-bold hover:text-orange-700 transition-colors"
                                                >
                                                    <Eye size={16} />
                                                    Détail
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Statistiques résumées */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium text-slate-600">Total employés</span>
                                <Users size={20} className="text-slate-400" />
                            </div>
                            <div className="text-2xl font-bold text-slate-900">{monthlyData.length}</div>
                            <div className="text-xs text-slate-500 mt-1">Actifs ce mois</div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium text-slate-600">Total heures</span>
                                <Clock size={20} className="text-slate-400" />
                            </div>
                            <div className="text-2xl font-bold text-orange-600">
                                {monthlyData.reduce((sum, emp) => sum + emp.totalHours, 0)}h
                            </div>
                            <div className="text-xs text-slate-500 mt-1">{selectedMonth}</div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium text-slate-600">Moyenne/employé</span>
                                <FileBarChart size={20} className="text-slate-400" />
                            </div>
                            <div className="text-2xl font-bold text-blue-600">
                                {Math.round(monthlyData.reduce((sum, emp) => sum + emp.totalHours, 0) / monthlyData.length)}h
                            </div>
                            <div className="text-xs text-slate-500 mt-1">Par mois</div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-medium text-slate-600">Total sessions</span>
                                <History size={20} className="text-slate-400" />
                            </div>
                            <div className="text-2xl font-bold text-green-600">
                                {monthlyData.reduce((sum, emp) => sum + emp.sessions, 0)}
                            </div>
                            <div className="text-xs text-slate-500 mt-1">Pointages</div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (
            <MainLayout activePage="suivi-rh" breadcrumb="Suivi RH">
                <SuiviRHPage />
            </MainLayout>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
