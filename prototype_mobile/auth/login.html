<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chantier Pro - Connexion</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="phone">
    <div class="notch">
      <div class="notch-dot"></div>
    </div>
    <div class="screen">
      <div class="topbar" style="text-align:center;">
        <div style="font-size:22px;font-weight:700;color:#f8fafc;letter-spacing:-0.025em;">CHANTIER<span style="color:#EA580C;">PRO</span></div>
        <div style="font-size:13px;color:#94a3b8;margin-top:4px;">Connexion</div>
      </div>
      <div class="content" style="padding:24px;display:flex;flex-direction:column;min-height:400px;">
        <!-- Logo et bienvenue -->
        <div style="text-align:center;margin-bottom:32px;">
          <div style="width:64px;height:64px;background:linear-gradient(135deg,#EA580C,#dc2626);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 20px rgba(234,90,12,0.3);">
            <i data-lucide="hard-hat" style="width:32px;height:32px;color:#ffffff;"></i>
          </div>
          <h1 style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px;">Bienvenue !</h1>
          <p style="font-size:14px;color:#64748b;">Connectez-vous à votre espace</p>
        </div>

        <!-- Formulaire -->
        <div style="flex:1;">
          <div class="label" style="margin-bottom:8px;">Email professionnel</div>
          <div class="input-field" style="color:#334155;font-size:15px;padding:14px 16px;margin-bottom:20px;">
            martin.dupont@entreprise.fr
          </div>
          
          <div class="label" style="margin-bottom:8px;">Mot de passe</div>
          <div class="input-field" style="color:#334155;font-size:15px;padding:14px 16px;margin-bottom:32px;">
            ••••••••
          </div>
          
          <a href="../technicien/home.html" class="btn-primary" style="display:block;text-align:center;margin-bottom:20px;">
            <i data-lucide="log-in" style="width: 18px; height: 18px; margin-right: 10px;"></i>
            Se connecter
          </a>
          
          <div style="text-align:center;">
            <a href="#" style="font-size:14px;color:#EA580C;text-decoration:none;font-weight:500;">Mot de passe oublié ?</a>
          </div>
        </div>

        <!-- Footer -->
        <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;">
          <p style="font-size:12px;color:#94a3b8;">Version 2.0 • UI/UX PRO MAX</p>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Initialiser les icônes Lucide
    lucide.createIcons();
  </script>
</body>
</html>
