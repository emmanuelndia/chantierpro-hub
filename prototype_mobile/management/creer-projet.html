<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chantier Pro - Créer Projet</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="phone">
    <div class="notch">
      <div class="notch-dot"></div>
    </div>
    <div class="screen">
      <div class="topbar">
        <a href="gestion-projets.html" style="font-size:12px;color:#aaa;cursor:pointer;text-decoration:none;">← Gestion</a>
        <div style="text-align:right;"><div class="topbar-title">Nouveau Projet</div><div class="topbar-sub">Direction</div></div>
      </div>

      <div class="content">
        <!-- Formulaire de création -->
        <form>
          <!-- Informations générales -->
          <div class="label">Informations générales</div>
          <div class="card" style="margin-bottom:16px;">
            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Nom du projet *</label>
              <input type="text" placeholder="Ex: Rénovation Rue de Lyon" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
            </div>
            
            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Description</label>
              <textarea placeholder="Description du projet..." style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;min-height:60px;resize:none;"></textarea>
            </div>

            <div style="display:flex;gap:8px;">
              <div style="flex:1;">
                <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Date de début *</label>
                <input type="date" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
              </div>
              <div style="flex:1;">
                <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Date de fin prévue *</label>
                <input type="date" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
              </div>
            </div>
          </div>

          <!-- Localisation -->
          <div class="label">Localisation</div>
          <div class="card" style="margin-bottom:16px;">
            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Adresse</label>
              <input type="text" placeholder="Ex: 123 Rue de Lyon, Paris 12e" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
            </div>
            
            <div style="display:flex;gap:8px;">
              <div style="flex:1;">
                <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Latitude</label>
                <input type="text" placeholder="48.8484" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
              </div>
              <div style="flex:1;">
                <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Longitude</label>
                <input type="text" placeholder="2.3701" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
              </div>
            </div>
          </div>

          <!-- Équipe -->
          <div class="label">Équipe</div>
          <div class="card" style="margin-bottom:16px;">
            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Chef de projet *</label>
              <select style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
                <option>Sélectionner un chef de projet</option>
                <option>Sophie Renard</option>
                <option>Martin Dupont</option>
                <option>Thomas Leroy</option>
              </select>
            </div>

            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Techniciens assignés</label>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox" checked> Martin Dupont
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox" checked> Lucie Bernard
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox"> Paul Martin
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox"> Kemal Aydin
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox"> Pierre Martin
                </label>
                <label style="display:flex;align-items:center;gap:4px;font-size:11px;">
                  <input type="checkbox"> Claire Petit
                </label>
              </div>
            </div>
          </div>

          <!-- Paramètres -->
          <div class="label">Paramètres</div>
          <div class="card" style="margin-bottom:16px;">
            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Priorité</label>
              <select style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
                <option value="normal">Normale</option>
                <option value="high">Prioritaire</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Type de projet</label>
              <select style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
                <option>Rénovation</option>
                <option>Construction</option>
                <option>Extension</option>
                <option>Maintenance</option>
              </select>
            </div>

            <div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Budget estimé</label>
              <input type="text" placeholder="Ex: 150000" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
            </div>

            <div>
              <label style="display:flex;align-items:center;gap:8px;font-size:11px;">
                <input type="checkbox"> Activer les notifications automatiques
              </label>
            </div>
          </div>

          <!-- Chantiers initiaux -->
          <div class="label">Chantiers initiaux</div>
          <div class="card" style="margin-bottom:20px;">
            <div style="margin-bottom:8px;">
              <label style="font-size:11px;color:#64748b;margin-bottom:4px;display:block;">Ajouter des chantiers</label>
              <div style="display:flex;gap:8px;">
                <input type="text" placeholder="Nom du chantier" style="flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;">
                <button type="button" class="btn-secondary" style="padding:8px;font-size:11px;">
                  <i data-lucide="plus" style="width:14px;height:14px;"></i>
                </button>
              </div>
            </div>
            
            <div style="display:flex;flex-direction:column;gap:6px;">
              <div style="display:flex;align-items:center;gap:8px;padding:6px;background:#f8fafc;border-radius:6px;">
                <i data-lucide="map-pin" style="width:12px;height:12px;color:#64748b;"></i>
                <span style="font-size:11px;flex:1;">Site A — Entrée principale</span>
                <button type="button" class="btn-icon" style="padding:4px;">
                  <i data-lucide="x" style="width:12px;height:12px;color:#dc2626;"></i>
                </button>
              </div>
              <div style="display:flex;align-items:center;gap:8px;padding:6px;background:#f8fafc;border-radius:6px;">
                <i data-lucide="map-pin" style="width:12px;height:12px;color:#64748b;"></i>
                <span style="font-size:11px;flex:1;">Site B — Façade arrière</span>
                <button type="button" class="btn-icon" style="padding:4px;">
                  <i data-lucide="x" style="width:12px;height:12px;color:#dc2626;"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div style="display:flex;gap:8px;">
            <button type="button" class="btn-secondary" style="flex:1;font-size:12px;padding:12px;">
              Annuler
            </button>
            <button type="submit" class="btn-primary" style="flex:1;font-size:12px;padding:12px;">
              Créer le projet
            </button>
          </div>
        </form>
      </div>

      <div class="nav">
        <a href="../management/dashboard.html" class="nav-item active">
          <i data-lucide="layout-dashboard" class="nav-icon"></i>
          <div class="nav-lbl active">Dashboard</div>
        </a>
        <a href="../management/galerie.html" class="nav-item">
          <i data-lucide="image" class="nav-icon"></i>
          <div class="nav-lbl">Galerie</div>
        </a>
        <a href="../management/presences.html" class="nav-item">
          <i data-lucide="users" class="nav-icon"></i>
          <div class="nav-lbl">Présences</div>
        </a>
        <a href="#" class="nav-item">
          <i data-lucide="user" class="nav-icon"></i>
          <div class="nav-lbl">Profil</div>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Initialiser les icônes Lucide
    lucide.createIcons();
  </script>
</body>
</html>
